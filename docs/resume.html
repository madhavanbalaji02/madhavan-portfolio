<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Madhavan Balaji — Resume</title>
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon-64.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b1519;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      font-family: system-ui, sans-serif;
    }
    #toolbar {
      width: 100%;
      max-width: 860px;
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    #toolbar a {
      color: #d4b595;
      text-decoration: none;
      font-size: 13px;
      border: 1px solid #d4b595;
      padding: 6px 14px;
      border-radius: 6px;
      opacity: 0.8;
    }
    #toolbar a:hover { opacity: 1; }
    #pages { width: 100%; max-width: 860px; }
    #pages canvas {
      display: block;
      width: 100%;
      height: auto;
      margin-bottom: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #loading {
      color: #5ec4d4;
      margin-top: 80px;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <a href="/resume.pdf" download>Download PDF ↓</a>
  </div>
  <div id="loading">Loading resume…</div>
  <div id="pages"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    pdfjsLib.getDocument('/resume.pdf').promise.then(function (pdf) {
      document.getElementById('loading').remove();
      var renders = [];
      for (var i = 1; i <= pdf.numPages; i++) {
        renders.push(renderPage(pdf, i));
      }
    }).catch(function () {
      document.getElementById('loading').textContent = 'Could not load resume.';
    });

    function renderPage(pdf, num) {
      return pdf.getPage(num).then(function (page) {
        var scale = window.devicePixelRatio > 1 ? 3 : 2;
        var viewport = page.getViewport({ scale: scale });
        var canvas = document.createElement('canvas');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        document.getElementById('pages').appendChild(canvas);
        return page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
      });
    }
  </script>
</body>
</html>
